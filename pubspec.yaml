name: mood_canvas
description: Track emotions visually with custom-drawn expressive faces.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^17.1.0

  # Networking
  internet_connection_checker_plus: ^2.9.1+2

  # State Management
  fpdart: ^1.2.0
  equatable: ^2.0.7
  flutter_bloc: ^9.1.1

  # DI
  get_it: ^8.0.3

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.7

  # Storage
  shared_preferences: ^2.5.4

  # Images & SVG
  flutter_svg: ^2.2.4

  # Icons

  # Shimmer / Skeleton
  skeletonizer: ^2.1.3

  # Responsive UI
  flutter_screenutil: ^5.9.3

  # Animations
  flutter_animate: ^4.5.2
  smooth_page_indicator: ^2.0.1

  # Environment
  flutter_dotenv: ^6.0.0

  # Logging
  logger: ^2.6.2

  # Media

  # Utilities

  # Device & System


  # Localization
  easy_localization: ^3.0.8

  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

dependency_overrides:

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/translations/
    - .env

