name: mood_canvas
description: Track emotions visually with custom-drawn expressive faces.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  cupertino_icons: ^1.0.8
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_web_plugins:
    sdk: flutter
  fpdart: ^1.2.0
  get_it: ^8.0.3
  intl: ^0.20.2
  shared_preferences: ^2.5.4

dev_dependencies:
  bloc_test: ^10.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^10.1.0

flutter:
  uses-material-design: true
